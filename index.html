<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawit Idle Clicker</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <section>
        <div class="main">
            <div class="left">
                <h3>Sawit: <span class="sawit-cost">0</span></h3>
                <img src="./images/sawit.png" alt="" srcset="" class="sawit-image" onclick="incrementSawit()">
            </div>
            <div class="right">
                <div class="upgrade" onclick="buyClicker()">
                    <div class="left-section">
                        <img src="/images/clicker-white.png" alt="" srcset="" class="upgrade-img">
                    </div>
                    <div class="mid-section">
                        <h4>Clicker</h4>
                        <div class="cost-info">
                            <p>Cost: <span class="clicker-cost">10</span></p>
                            <img src="images/sawit.png" alt="" srcset="" class="sawit-img">
                        </div>
                    </div>
                    <div class="right-section">
                        <p>Level: <span class="Level-cost">0</span></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="index.js"></script>
</body>
</html>
