<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawit Idle Clicker</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <section>
        <div class="main">
            <div class="left">
                <p>Sawit: <br/> <span class="sawit-cost sawit-text">10500</span></p>
                <div class="sawit-img-container">
                    <img src="./images/sawit.png" alt="" srcset="" class="sawit-image" onclick="incrementSawit(event)" draggable="false">
                </div>
                
            </div>
            <div class="right">
                <div class="upgrade" onclick="buyUpgrade(`clicker`)">
                    <div class="left-section">
                        <img src="/images/clicker-white.png" alt="" srcset="" class="upgrade-img">
                    </div>
                    <div class="mid-section">
                        <h4>Clicker</h4>
                        <div class="cost-info">
                            <p class="cost-text"> <span class="clicker-cost">10</span></p>
                            <img src="images/sawit.png" alt="" srcset="" class="sawit-img">
                        </div>
                    </div>
                    <div class="right-section">
                        Level: <span class="clicker-level">0</span>
                    </div>
                    <div class="next-level-info">
                        <p>
                            <span class="clicker-increase">1</span> Sawit/s
                        </p>
                    </div>
                </div>

                <div class="upgrade" onclick="buyUpgrade(`egrek`)">
                    <div class="left-section">
                        <img src="/images/egrek.png" alt="" srcset="" class="upgrade-img">
                    </div>
                    <div class="mid-section">
                        <h4>Egrek</h4>
                        <div class="cost-info">
                            <p class="cost-text"> <span class="egrek-cost">150</span></p>
                            <img src="images/sawit.png" alt="" srcset="" class="sawit-img">
                        </div>
                    </div>
                    <div class="right-section">
                        Level: <span class="egrek-level">0</span>
                    </div>
                    <div class="next-level-info">
                        <p>
                            <span class="egrek-increase">4</span> Sawit/s
                        </p>
                    </div>
                </div>

                <div class="upgrade" onclick="buyUpgrade(`mandor`)">
                    <div class="left-section">
                        <img src="/images/mandor-sawit.png" alt="" srcset="" class="upgrade-img">
                    </div>
                    <div class="mid-section">
                        <h4>Mandor</h4>
                        <div class="cost-info">
                            <p class="cost-text"> <span class="mandor-cost">550</span></p>
                            <img src="images/sawit.png" alt="" srcset="" class="sawit-img">
                        </div>
                    </div>
                    <div class="right-section">
                        Level: <span class="mandor-level">0</span>
                    </div>
                    <div class="next-level-info">
                        <p>
                            <span class="mandor-increase">10</span> Sawit/s
                        </p>
                    </div>
                </div>

                <div class="upgrade" onclick="buyUpgrade(`pabrik`)">
                    <div class="left-section">
                        <img src="/images/pabrik-sawit.png" alt="" srcset="" class="upgrade-img">
                    </div>
                    <div class="mid-section">
                        <h4>Pabrik</h4>
                        <div class="cost-info">
                            <p class="cost-text"> <span class="pabrik-cost">2500</span></p>
                            <img src="images/sawit.png" alt="" srcset="" class="sawit-img">
                        </div>
                    </div>
                    <div class="right-section">
                        Level: <span class="pabrik-level">0</span>
                    </div>
                    <div class="next-level-info">
                        <p>
                            <span class="pabrik-increase">24</span> Sawit/s
                        </p>
                    </div>
                </div>
            </div>
        </div>
        <div class="statistics">
            <div class="texts">
                <p>SPC: <span id="spc-text" class="sawit-text">1</span></p>
                <p>SPS: <span id="sps-text" class="sawit-text">0</span></p>
            </div>
        </div>
        <div class="util-buttons">
            <button class="util-button" onclick="save()">
                Save
            </button>
            <button class="util-button" onclick="load()">
                Load
            </button>
        </div>
    </section>

    <script src="index.js"></script>
</body>

</html>
